<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CopayGuard defensive pill logo drafts</title>
    <style>
      :root {
        color: #242424;
        background: #f6f4ef;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
        font-weight: 720;
      }

      p {
        margin: 0 0 24px;
        color: #68635b;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid #dfd9cf;
        border-radius: 8px;
        background: #ffffff;
      }

      img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
      }

      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 650;
      }

      span {
        color: #cf7427;
        font-weight: 720;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CopayGuard defensive pill drafts</h1>
      <p>Oversized shield, pill mascot holding it defensively.</p>
      <section class="grid" aria-label="CopayGuard defensive pill logo drafts">
        <figure>
          <img src="./copayguard-defensive-pill-01-front-block.jpg" alt="Pill mascot holding a large orange and gray shield" />
          <figcaption>Front block <span>01</span></figcaption>
        </figure>
        <figure>
          <img src="./copayguard-defensive-pill-02-side-brace.jpg" alt="Pill mascot bracing behind a large shield" />
          <figcaption>Side brace <span>02</span></figcaption>
        </figure>
        <figure>
          <img src="./copayguard-defensive-pill-03-peek-around.jpg" alt="Pill mascot peeking from behind an oversized shield" />
          <figcaption>Peek around <span>03</span></figcaption>
        </figure>
        <figure>
          <img src="./copayguard-defensive-pill-04-dynamic-guard.jpg" alt="Pill mascot holding a shield forward in a defensive stance" />
          <figcaption>Dynamic guard <span>04</span></figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
