<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CopayGuard current-vibe logo drafts</title>
    <style>
      :root {
        color: #f7f2eb;
        background: #171615;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 0%, rgba(221, 111, 72, 0.16), transparent 32rem),
          linear-gradient(180deg, #1b1918 0%, #131211 100%);
      }

      main {
        width: min(1240px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 34px 0 54px;
      }

      header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: end;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 7px;
        font-size: clamp(24px, 3vw, 40px);
        line-height: 1;
        font-weight: 780;
        letter-spacing: 0;
      }

      p {
        max-width: 720px;
        margin: 0;
        color: #bbb2a9;
        font-size: 14px;
        line-height: 1.7;
      }

      .tag {
        border: 1px solid rgba(226, 114, 70, 0.48);
        border-radius: 6px;
        padding: 9px 12px;
        color: #f2a56d;
        background: rgba(226, 114, 70, 0.08);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid rgba(108, 101, 94, 0.44);
        border-radius: 8px;
        background: #20201f;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.24);
      }

      .image-frame {
        padding: 12px;
        background: #121211;
      }

      img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 6px;
        object-fit: cover;
      }

      figcaption {
        min-height: 142px;
        padding: 14px;
        border-top: 1px solid rgba(108, 101, 94, 0.32);
      }

      .label-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 8px;
      }

      h2 {
        margin: 0;
        font-size: 16px;
        line-height: 1.18;
        font-weight: 820;
      }

      .number {
        color: #e67349;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        font-weight: 900;
      }

      .note {
        margin: 0;
        color: #aaa29a;
        font-size: 13px;
        line-height: 1.55;
      }

      .pick {
        display: inline-flex;
        margin-top: 12px;
        border: 1px solid rgba(102, 205, 118, 0.48);
        border-radius: 999px;
        padding: 5px 8px;
        color: #90df9e;
        background: rgba(102, 205, 118, 0.08);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      @media (max-width: 700px) {
        header {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .tag {
          width: fit-content;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>CopayGuard current-vibe logo drafts</h1>
          <p>
            Five darker orange/gray app-icon directions tuned to the current infographic:
            technical, warm, protective, and a little happier than the earlier guard marks.
          </p>
        </div>
        <div class="tag">Grok Imagine batch</div>
      </header>

      <section class="grid" aria-label="CopayGuard current-vibe logo drafts">
        <figure>
          <div class="image-frame">
            <img
              src="./copayguard-current-vibe-01-happy-shield-pill.jpg"
              alt="Happy pill mascot holding an oversized orange shield"
            />
          </div>
          <figcaption>
            <div class="label-row">
              <h2>Happy Shield Pill</h2>
              <span class="number">01</span>
            </div>
            <p class="note">
              Friendliest mascot version. The large shield still feels defensive, but the face
              makes it more patient-facing.
            </p>
            <span class="pick">Best mascot</span>
          </figcaption>
        </figure>

        <figure>
          <div class="image-frame">
            <img
              src="./copayguard-current-vibe-02-abstract-capsule-shield.jpg"
              alt="Abstract capsule and shield mark with an orange rim and green check"
            />
          </div>
          <figcaption>
            <div class="label-row">
              <h2>Capsule Shield</h2>
              <span class="number">02</span>
            </div>
            <p class="note">
              Cleanest product-icon read. Less character, more brand mark, and strong at small
              sizes.
            </p>
            <span class="pick">Best app icon</span>
          </figcaption>
        </figure>

        <figure>
          <div class="image-frame">
            <img
              src="./copayguard-current-vibe-03-price-drop-guard.jpg"
              alt="Shield-forward icon with a pill behind it and green confirmation mark"
            />
          </div>
          <figcaption>
            <div class="label-row">
              <h2>Price-Drop Guard</h2>
              <span class="number">03</span>
            </div>
            <p class="note">
              Strong protection language with a clear slash/check motif. It reads a bit more
              serious than happy.
            </p>
          </figcaption>
        </figure>

        <figure>
          <div class="image-frame">
            <img
              src="./copayguard-current-vibe-04-pixel-friendly.jpg"
              alt="Pixel-style happy pill mascot beside a chunky orange shield"
            />
          </div>
          <figcaption>
            <div class="label-row">
              <h2>Pixel Friendly</h2>
              <span class="number">04</span>
            </div>
            <p class="note">
              The happiest option. It is memorable, but probably too playful unless the product
              leans into a more gamified brand.
            </p>
          </figcaption>
        </figure>

        <figure>
          <div class="image-frame">
            <img
              src="./copayguard-current-vibe-05-secure-savings-badge.jpg"
              alt="Premium shield badge with capsule shadow, orange arrow, and green check"
            />
          </div>
          <figcaption>
            <div class="label-row">
              <h2>Secure Savings Badge</h2>
              <span class="number">05</span>
            </div>
            <p class="note">
              Most mature and restrained. Good fallback if the brand should feel less mascot-led.
            </p>
            <span class="pick">Most premium</span>
          </figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
