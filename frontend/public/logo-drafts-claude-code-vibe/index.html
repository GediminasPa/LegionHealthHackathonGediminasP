<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CopayGuard developer-tool logo drafts</title>
    <style>
      :root {
        color: #f4eee7;
        background: #141414;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
        font-weight: 720;
      }

      p {
        margin: 0 0 24px;
        color: #b9b0a7;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }

      figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid #37322e;
        border-radius: 8px;
        background: #202020;
      }

      img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
      }

      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 650;
      }

      span {
        color: #d9793f;
        font-weight: 720;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CopayGuard developer-tool drafts</h1>
      <p>Dark rounded-square, orange technical linework, defensive pill shield.</p>
      <section class="grid" aria-label="CopayGuard developer-tool style logo drafts">
        <figure>
          <img src="./copayguard-claude-code-vibe-01-pixel-shield.jpg" alt="Pixel style pill mascot holding a large shield" />
          <figcaption>Pixel shield <span>01</span></figcaption>
        </figure>
        <figure>
          <img src="./copayguard-claude-code-vibe-02-terminal-badge.jpg" alt="Terminal style pill mascot behind a shield" />
          <figcaption>Terminal badge <span>02</span></figcaption>
        </figure>
        <figure>
          <img src="./copayguard-claude-code-vibe-03-copper-grid.jpg" alt="Copper grid shield with a pill mascot behind it" />
          <figcaption>Copper grid <span>03</span></figcaption>
        </figure>
        <figure>
          <img src="./copayguard-claude-code-vibe-04-block-mark.jpg" alt="Blocky pill mascot holding a large orange shield" />
          <figcaption>Block mark <span>04</span></figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
